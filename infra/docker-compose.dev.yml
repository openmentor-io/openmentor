# Development overrides for docker-compose.yml
#
# Dev/prod parity: the merged stack runs the SAME service set as production —
# traefik / frontend / backend / worker / migrate / postgres — with local
# image tags and dev credentials. Differences from production:
#
#   - traefik runs HTTP-only on :80 (no ACME/Cloudflare DNS, no :443) and
#     routes Host(`localhost`) to the frontend
#   - frontend/backend/worker/migrate run locally built images
#     (openmentor-frontend:dev-<sha> / openmentor-backend:dev-<sha>, built and
#     tagged by ./deploy-dev.sh — same SHA-tag convergence model as prod)
#   - postgres uses dev credentials, a disposable non-external volume and
#     publishes host port 5433 for local tooling
#   - app ports (3000/8081/8090) are additionally published directly for
#     debugging; in production only traefik is exposed
#   - alloy and cadvisor are OPT-IN behind the `observability` profile:
#     alloy cannot start without Grafana Cloud credentials AND the
#     ./alloy-secrets/postgres_secret_openmentor file (its local.file
#     component fails hard on a missing file), so it must not be part of the
#     default dev stack. Enable with:
#       docker compose -f docker-compose.yml -f docker-compose.dev.yml \
#         --profile observability up -d
#   - postgres-backup stays production-only (dev data is disposable and the
#     local stack must never touch backup buckets)
#
# Usage: ./deploy-dev.sh [targets...]   (recommended — builds images, sets
#        FRONTEND_IMAGE_TAG/BACKEND_IMAGE_TAG in .env, regenerates
#        .env.runtime, converges, healthchecks)
# Raw:   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#        (requires images already built/tagged AND .env/.env.runtime present,
#        e.g. from a previous ./deploy-dev.sh run; after editing .env, rerun
#        ./deploy-dev.sh infra or regenerate .env.runtime yourself:
#        grep -vE '^(FRONTEND_IMAGE_TAG|BACKEND_IMAGE_TAG)=' .env > .env.runtime)

services:
  # Traefik in HTTP-only mode: no Let's Encrypt / Cloudflare DNS-01, single
  # :80 entrypoint, and no HTTP->HTTPS redirect (labels overridden below).
  traefik:
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports: !override
      - "80:80"
    environment: !override []
    labels: !override []

  frontend:
    # Locally built image (tagged by ./deploy-dev.sh); same runner target as
    # production so convergence behaves identically.
    image: openmentor-frontend:${FRONTEND_IMAGE_TAG:-dev}
    environment:
      - APP_ENV=development
      - NEXT_PUBLIC_APP_ENV=${NEXT_PUBLIC_APP_ENV:-development}
    # Publish directly for debugging alongside the traefik route
    ports:
      - "3000:3000"
    # HTTP-only localhost routing (base labels reference the websecure
    # entrypoint and the letsencrypt resolver, which don't exist in dev)
    labels: !override
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`) || Host(`www.localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  # PostgreSQL database for development.
  # Overrides the base `postgres` service (same image/limits) with dev
  # credentials, a regular non-external dev volume (the mount below replaces
  # the base `postgres-data` mount — same container path wins on merge) and
  # host port 5433 for local tooling. Only ONE database runs in the merged
  # stack.
  postgres:
    container_name: openmentor-postgres-dev
    environment:
      - POSTGRES_USER=openmentor
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=openmentor
      - POSTGRES_HOST_AUTH_METHOD=md5
    ports:
      # Host port for local tooling; override with POSTGRES_DEV_PORT in .env
      # if 5433 is taken on your machine
      - "${POSTGRES_DEV_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmentor"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # migrate/backend/worker share the locally built backend image. The base
  # dependency ordering is kept untouched: migrate waits for postgres to be
  # healthy, backend and worker wait for migrate to complete successfully.
  migrate:
    image: openmentor-backend:${BACKEND_IMAGE_TAG:-dev}
    environment:
      - APP_ENV=development
      - LOG_LEVEL=debug
      - DATABASE_URL=postgresql://openmentor:password@postgres:5432/openmentor?sslmode=disable

  backend:
    image: openmentor-backend:${BACKEND_IMAGE_TAG:-dev}
    # Publish directly for debugging (in prod the API is internal-only)
    ports:
      - "8081:8081"
    environment:
      - GIN_MODE=debug
      - APP_ENV=development
      - LOG_LEVEL=debug
      - DATABASE_URL=postgresql://openmentor:password@postgres:5432/openmentor?sslmode=disable

  worker:
    image: openmentor-backend:${BACKEND_IMAGE_TAG:-dev}
    # Publish directly for debugging (manual job/cron triggers)
    ports:
      - "8090:8090"
    environment:
      - GIN_MODE=debug
      - APP_ENV=development
      - LOG_LEVEL=debug
      - DATABASE_URL=postgresql://openmentor:password@postgres:5432/openmentor?sslmode=disable

  # Disable the backup sidecar in development - dev data is disposable and
  # the local stack should not touch backup buckets
  postgres-backup:
    profiles:
      - production-only

  # Observability is OPT-IN in dev (`--profile observability`): running alloy
  # without real Grafana Cloud credentials would only spam push errors, and it
  # fails to start at all without ./alloy-secrets/postgres_secret_openmentor
  # (see header comment). cadvisor is only useful when alloy scrapes it.
  alloy:
    profiles:
      - observability

  cadvisor:
    profiles:
      - observability

volumes:
  pgdata:
    name: openmentor-postgres-data-dev

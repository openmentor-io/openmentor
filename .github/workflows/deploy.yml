name: Deploy

# Monorepo deploy: both images build from local subdirectories (web/ and
# api/), and the infra/ subdirectory is synced to the VM in place of the old
# separate infrastructure repository.

on:
  # Deploys are manual for now. If/when auto-deploy is wanted, add:
  # push:
  #   branches: [main]
  #   paths: ['web/**', 'api/**', 'infra/**']
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - both
          - frontend
          - backend
        default: 'both'
      image_tag:
        description: 'Image tag (leave empty for commit SHA)'
        required: false
        type: string

# OIDC: the build jobs assume the AWS_CI_ROLE_ARN role via GitHub's OIDC
# provider (aws-actions/configure-aws-credentials) — no long-lived AWS keys
# in this repo's secrets. id-token: write is required for that token.
permissions:
  id-token: write
  contents: read

env:
  # AWS ECR (D19): registry host (<account-id>.dkr.ecr.<region>.amazonaws.com)
  # comes from the ECR_REGISTRY secret, set by the private provisioning
  # repo's set-github-secrets.sh alongside AWS_REGION and AWS_CI_ROLE_ARN.
  REGISTRY: ${{ secrets.ECR_REGISTRY }}
  FRONTEND_IMAGE: openmentor-frontend
  BACKEND_IMAGE: openmentor-backend
  DOMAIN: ${{ secrets.DOMAIN }}

jobs:
  # Build and push frontend
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    if: github.event.inputs.service == 'frontend' || github.event.inputs.service == 'both'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.tags.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_GO_API_URL=http://backend:8081
            NEXT_PUBLIC_S3_STORAGE_ENDPOINT=${{ secrets.NEXT_PUBLIC_S3_STORAGE_ENDPOINT }}
            NEXT_PUBLIC_S3_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_S3_STORAGE_BUCKET }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}
            NEXT_PUBLIC_CDN_ENDPOINT=${{ secrets.NEXT_PUBLIC_CDN_ENDPOINT }}

      - name: Image build summary
        run: |
          echo "✅ Frontend image built and pushed successfully!"
          echo "Image: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.tags.outputs.TAG }}"

  # Build and push backend
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    if: github.event.inputs.service == 'backend' || github.event.inputs.service == 'both'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.tags.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image build summary
        run: |
          echo "✅ Backend image built and pushed successfully!"
          echo "Image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.tags.outputs.TAG }}"

  # Deploy to production VM
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: always() && (needs.build-frontend.result == 'success' || needs.build-backend.result == 'success')
    environment:
      name: production
      url: https://${{ env.DOMAIN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying with tag: $TAG"

      # The VM used to `git pull` a separate infrastructure repo in
      # /opt/openmentor/infra. In the monorepo the compose files live in
      # infra/, so sync that subdirectory instead (same semantics as the
      # `infra` target of infra/deploy.sh). No --delete: runtime state
      # (.env, logs, backups, alloy-secrets) living next to the compose files
      # must survive. --checksum --itemize-changes reports WHICH files
      # changed so the deploy step can restart/rebuild services whose config
      # reaches the container through a bind mount (compose won't notice
      # those): alloy <- alloy/config.alloy (restart), postgres-backup is
      # built on the VM from postgres-backup/ (rebuild).
      - name: Sync infra/ to VM
        id: sync
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 -H "${{ secrets.VM_SSH_HOST }}" >> ~/.ssh/known_hosts

          rsync -az --checksum --itemize-changes \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'logs/' \
            --exclude 'alloy-secrets/' \
            -e "ssh -i ~/.ssh/deploy_key -p 22" \
            infra/ \
            "${{ secrets.VM_SSH_USER }}@${{ secrets.VM_SSH_HOST }}:/opt/openmentor/infra/" \
            | tee rsync.log

          CHANGED_FILES=$(awk '$1 ~ /^[<>]f/ {print $2}' rsync.log)
          RESTART_ALLOY=0
          REBUILD_BACKUP=0
          if echo "$CHANGED_FILES" | grep -qx 'alloy/config.alloy'; then RESTART_ALLOY=1; fi
          if echo "$CHANGED_FILES" | grep -q '^postgres-backup/'; then REBUILD_BACKUP=1; fi
          echo "restart_alloy=$RESTART_ALLOY" >> $GITHUB_OUTPUT
          echo "rebuild_backup=$REBUILD_BACKUP" >> $GITHUB_OUTPUT
          echo "Bind-mount changes: restart_alloy=$RESTART_ALLOY rebuild_backup=$REBUILD_BACKUP"

      - name: Configure AWS credentials (mint ECR token for the VM)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Mint ECR login token
        run: |
          TOKEN=$(aws ecr get-login-password --region "${{ secrets.AWS_REGION }}")
          echo "::add-mask::$TOKEN"
          echo "ECR_PASSWORD=$TOKEN" >> "$GITHUB_ENV"

      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script_stop: true
          envs: ECR_PASSWORD
          script: |
            set -e

            echo "🚀 Starting deployment..."

            # Navigate to infra directory (already synced from the monorepo
            # infra/ subdirectory by the previous step)
            cd /opt/openmentor/infra

            # Backup the current .env (previous image tags) for rollback —
            # same mechanism as infra/deploy.sh. The .env itself is uploaded
            # by deploy.sh (the workflow only maintains the tag lines,
            # left for P6.4 to unify).
            if [ -f .env ]; then cp .env .env.backup; else touch .env; fi

            # Replace-or-append a KEY=value in .env
            set_env_tag() {
              if grep -q "^${1}=" .env; then
                sed -i "s|^${1}=.*|${1}=${2}|" .env
              else
                echo "${1}=${2}" >> .env
              fi
            }

            # Per-service image tags (FRONTEND_IMAGE_TAG / BACKEND_IMAGE_TAG,
            # matching infra/deploy.sh): only the deployed service's tag is
            # updated; the other keeps its currently deployed tag.
            SERVICE="${{ github.event.inputs.service }}"
            TAG="${{ steps.tag.outputs.TAG }}"
            if [ "$SERVICE" = "frontend" ] || [ "$SERVICE" = "both" ]; then
              set_env_tag FRONTEND_IMAGE_TAG "$TAG"
            fi
            if [ "$SERVICE" = "backend" ] || [ "$SERVICE" = "both" ]; then
              set_env_tag BACKEND_IMAGE_TAG "$TAG"
            fi
            echo "Deploying with:"
            grep -E "^(FRONTEND|BACKEND)_IMAGE_TAG=" .env

            # Regenerate .env.runtime: container env WITHOUT the tag lines
            # (tags only affect compose interpolation, so a tag-only deploy
            # recreates only the retagged service)
            regen_env_runtime() {
              grep -vE '^(FRONTEND_IMAGE_TAG|BACKEND_IMAGE_TAG)=' .env > .env.runtime
              chmod 600 .env.runtime
            }
            regen_env_runtime

            # Login to AWS ECR (D19) with a short-lived token minted in the
            # runner (OIDC role) and delivered via the action's `envs` —
            # the VM holds no AWS credentials and needs no aws CLI.
            echo "🔑 Logging in to registry..."
            ECR_REGISTRY=$(grep "^ECR_REGISTRY=" .env | cut -d'=' -f2)
            printf '%s' "$ECR_PASSWORD" | docker login \
              --username AWS \
              --password-stdin \
              "$ECR_REGISTRY"

            # Ensure the external Postgres data volume exists (idempotent)
            docker volume create openmentor-postgres-data

            # Rebuild the backup sidecar image if its build context changed
            # in the sync (it is built on the VM from ./postgres-backup)
            if [ "${{ steps.sync.outputs.rebuild_backup }}" = "1" ]; then
              echo "🔨 postgres-backup/ changed — rebuilding sidecar image..."
              docker compose build postgres-backup
            fi

            # Pull new images
            echo "📦 Pulling images..."
            docker compose pull

            # Converge: compose recreates only services whose image tag (or
            # definition) changed; --remove-orphans drops deleted services
            echo "🔄 Converging services..."
            docker compose up -d --remove-orphans

            # Bind-mount trap: compose does not react to changes in
            # bind-mounted config files — restart alloy if its config changed
            if [ "${{ steps.sync.outputs.restart_alloy }}" = "1" ]; then
              echo "↻ alloy/config.alloy changed — restarting alloy..."
              docker compose restart alloy
            fi

            # Wait for containers to start
            echo "⏳ Waiting for containers to start..."
            sleep 20

            # Check service status
            echo "📊 Service status:"
            docker compose ps

            # Verify health checks (CRITICAL - fail if health checks fail)
            echo "🏥 Checking health endpoints..."
            HEALTH_CHECK_FAILED=0

            # Check frontend health
            if ! docker exec openmentor-frontend curl -f http://localhost:3000/api/healthcheck 2>/dev/null; then
              echo "❌ Frontend health check FAILED"
              HEALTH_CHECK_FAILED=1
            else
              echo "✅ Frontend health check passed"
            fi

            # Check backend health
            if ! docker exec openmentor-backend curl -f http://localhost:8081/api/healthcheck 2>/dev/null; then
              echo "❌ Backend health check FAILED"
              HEALTH_CHECK_FAILED=1
            else
              echo "✅ Backend health check passed"
            fi

            # Check worker health
            if ! docker exec openmentor-worker curl -f http://localhost:8090/healthz 2>/dev/null; then
              echo "❌ Worker health check FAILED"
              HEALTH_CHECK_FAILED=1
            else
              echo "✅ Worker health check passed"
            fi

            # Rollback if health checks failed: restore the previous .env
            # (previous image tags) and re-converge
            if [ $HEALTH_CHECK_FAILED -eq 1 ]; then
              echo "🔄 ROLLING BACK to previous version (.env.backup)..."
              cp .env.backup .env
              regen_env_runtime
              docker compose pull
              docker compose up -d
              sleep 10

              # Verify rollback succeeded
              if docker exec openmentor-frontend curl -f http://localhost:3000/api/healthcheck 2>/dev/null && \
                 docker exec openmentor-backend curl -f http://localhost:8081/api/healthcheck 2>/dev/null && \
                 docker exec openmentor-worker curl -f http://localhost:8090/healthz 2>/dev/null; then
                echo "✅ Rollback successful"
              else
                echo "❌ Rollback FAILED - manual intervention required!"
              fi

              exit 1
            fi

            echo "✅ Deployment complete!"

      - name: Verify deployment
        run: |
          echo "⏳ Waiting for services to stabilize..."
          sleep 30

          echo "🔍 Verifying public endpoints..."

          # Check if domain is configured in secrets
          if [ -n "${{ secrets.DOMAIN }}" ]; then
            # Check HTTPS health endpoint
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.DOMAIN }}/api/healthcheck || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Health check passed (HTTP $HTTP_STATUS)"
            else
              echo "⚠️  Health check returned HTTP $HTTP_STATUS"
              echo "This might be expected if DNS/SSL is not yet configured"
            fi
          else
            echo "⚠️  DOMAIN secret not set, skipping public health check"
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag**: ${{ steps.tag.outputs.TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment completed successfully!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Next steps**:" >> $GITHUB_STEP_SUMMARY
            echo "1. Verify application at https://${{ secrets.DOMAIN }}" >> $GITHUB_STEP_SUMMARY
            echo "2. Monitor Grafana dashboards for anomalies" >> $GITHUB_STEP_SUMMARY
            echo "3. Check error logs if needed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Deployment failed!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Troubleshooting**:" >> $GITHUB_STEP_SUMMARY
            echo "1. Check workflow logs above" >> $GITHUB_STEP_SUMMARY
            echo "2. SSH to VM and run: \`docker compose logs\`" >> $GITHUB_STEP_SUMMARY
            echo "3. Consider rolling back: \`./rollback.sh <previous-sha>\` from a workstation, or on the VM: \`cp .env.backup .env && docker compose up -d\`" >> $GITHUB_STEP_SUMMARY
          fi

  # Notify on failure
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "🚨 Deployment failed!"
          echo "Check the workflow logs for details"

          # Add Slack/Telegram/Email notification here if needed
          # Example Slack webhook:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"🚨 Deployment failed! Check GitHub Actions."}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}

name: CI / API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/ci-api.yml'
  pull_request:
    paths:
      - 'api/**'
      - '.github/workflows/ci-api.yml'

  # Allows manual trigger from Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25'

defaults:
  run:
    working-directory: api

# SECURITY (L6): least-privilege default token for this workflow.
permissions:
  contents: read

jobs:
  # Vet + race tests + coverage floor + binary builds
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with race detector and coverage
        run: |
          # -coverpkg measures coverage across all packages, not just test packages
          go test -race -timeout=5m -covermode=atomic -coverprofile=coverage.out -coverpkg=./... ./...
          go tool cover -func=coverage.out

      - name: Check test coverage
        run: |
          # If coverage.out is missing or empty, treat coverage as 0
          if [ ! -s coverage.out ]; then
            echo "No coverage data produced."
            coverage=0
          else
            coverage=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | sed 's/%//')
            if [ -z "$coverage" ]; then
              coverage=0
            fi
          fi

          echo "Total coverage: ${coverage}%"

          # Set minimum coverage threshold (currently lenient, increase over time)
          threshold=10

          if (( $(echo "$coverage < $threshold" | bc -l) )); then
            echo "Coverage ${coverage}% is below threshold ${threshold}%"
            exit 1
          else
            echo "Coverage ${coverage}% meets threshold ${threshold}%"
          fi

      - name: Build all binaries (api, worker, migrate)
        run: |
          go build -v ./cmd/api
          go build -v ./cmd/worker
          go build -v ./cmd/migrate

  # Code quality checks (formatting + staticcheck)
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: api/go.sum

      - name: Check code formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            echo ""
            echo "Please run: gofmt -w ."
            exit 1
          fi
          echo "All files are properly formatted"

      - name: Check for common mistakes
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

  # Security checks
  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: api/go.sum

      # The gosec action runs from the repo root, so scope it to ./api/...
      # -no-fail: report findings to code scanning via SARIF (the upload below)
      # instead of failing the build — this job is informational, not a gate
      # (the required check is "Checks / required-checks"). It also tolerates
      # gosec's SSA-analyzer panic on Go 1.25 (a recovered upstream tool bug
      # that doesn't affect the rule-based findings).
      - name: Run Gosec Security Scanner
        uses: securego/gosec@v2.22.10
        with:
          args: '-no-fail -fmt sarif -out results.sarif ./api/...'

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
        continue-on-error: true

  # Docker image build + full-stack smoke test
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: false
          load: true
          tags: openmentor-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Boots the full stack from the built image: postgres -> migrations ->
      # api -> worker, then smoke-tests health, metrics, and worker auth.
      - name: Smoke test image (migrate + api + worker against Postgres)
        run: |
          set -euo pipefail
          IMAGE=openmentor-api:${{ github.sha }}
          DBURL='postgres://openmentor:ci@pg:5432/openmentor?sslmode=disable'

          docker network create ci-net

          # All three binaries (migrate, api, worker) load the same config,
          # which hard-requires these vars in production (APP_ENV defaults to
          # production) — including JWT_SECRET (>=32 chars) and WORKER_AUTH_TOKEN
          # per the security hardening. Share one env file so they can't drift.
          printf '%s\n' \
            "DATABASE_URL=$DBURL" \
            'INTERNAL_MENTORS_API=test-token' \
            'MENTORS_API_LIST_AUTH_TOKEN=test-token-1' \
            'TURNSTILE_SECRET_KEY=1x0000000000000000000000000000000AA' \
            'JWT_SECRET=ci-jwt-secret-not-a-real-secret-0123456789' \
            'WORKER_AUTH_TOKEN=ci-worker-token' \
            > ci.env

          docker run -d --name pg --network ci-net \
            -e POSTGRES_USER=openmentor -e POSTGRES_PASSWORD=ci -e POSTGRES_DB=openmentor \
            postgres:16-alpine
          for i in $(seq 1 30); do
            docker exec pg pg_isready -U openmentor -d openmentor && break
            [ "$i" = 30 ] && { echo "postgres never became ready"; exit 1; }
            sleep 1
          done

          echo "--- running migrations"
          docker run --rm --network ci-net --env-file ci.env "$IMAGE" /app/migrate

          echo "--- starting api"
          docker run -d --name api --network ci-net -p 8081:8081 \
            --env-file ci.env \
            "$IMAGE"

          echo "--- starting worker"
          docker run -d --name worker --network ci-net -p 8090:8090 \
            --env-file ci.env \
            "$IMAGE" /app/worker

          wait_for() {
            local url=$1
            for i in $(seq 1 30); do
              curl -fsS "$url" >/dev/null && return 0
              sleep 1
            done
            echo "timed out waiting for $url"
            return 1
          }

          echo "--- api health + metrics"
          wait_for http://localhost:8081/api/healthcheck || { docker logs api; exit 1; }
          curl -f http://localhost:8081/api/metrics | grep -E "(http_server_|openmentor_|process_runtime_)" || { docker logs api; exit 1; }

          echo "--- worker health + metrics + auth"
          wait_for http://localhost:8090/healthz || { docker logs worker; exit 1; }
          curl -f http://localhost:8090/metrics >/dev/null || { docker logs worker; exit 1; }
          # /jobs must reject requests without the worker token...
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:8090/jobs/mentor-login-email)
          [ "$code" = "401" ] || { echo "expected 401 without token, got $code"; docker logs worker; exit 1; }
          # ...and accept the token (404 = passed auth, unknown mentor id is fine for a smoke test)
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
            -H "X-Worker-Token: ci-worker-token" -H "Content-Type: application/json" \
            -d '{"type":"mentor_login","mentor_id":"00000000-0000-0000-0000-000000000000","login_url":"https://example.com"}' \
            http://localhost:8090/jobs/mentor-login-email)
          case "$code" in 200|404) ;; *) echo "expected 200/404 with token, got $code"; docker logs worker; exit 1;; esac

          echo "--- logs (for the record)"
          docker logs api
          docker logs worker

          docker rm -f api worker pg
          docker network rm ci-net

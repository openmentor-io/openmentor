name: Deploy

# Monorepo deploy: both images build from local subdirectories (web/ and
# api/), and the infra/ subdirectory is synced to the VM in place of the old
# separate infrastructure repository.

on:
  # Deploys are manual for now. If/when auto-deploy is wanted, add:
  # push:
  #   branches: [main]
  #   paths: ['web/**', 'api/**', 'infra/**']
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - both
          - frontend
          - backend
        default: 'both'
      image_tag:
        description: 'Image tag (leave empty for commit SHA)'
        required: false
        type: string

# OIDC: the build jobs assume the AWS_CI_ROLE_ARN role via GitHub's OIDC
# provider (aws-actions/configure-aws-credentials) — no long-lived AWS keys
# in this repo's secrets. id-token: write is required for that token.
permissions:
  id-token: write
  contents: read

env:
  # AWS ECR (D19): registry host (<account-id>.dkr.ecr.<region>.amazonaws.com)
  # comes from the ECR_REGISTRY secret, set by the private provisioning
  # repo's set-github-secrets.sh alongside AWS_REGION and AWS_CI_ROLE_ARN.
  REGISTRY: ${{ secrets.ECR_REGISTRY }}
  FRONTEND_IMAGE: openmentor-frontend
  BACKEND_IMAGE: openmentor-backend
  DOMAIN: ${{ secrets.DOMAIN }}

jobs:
  # Build and push frontend
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    if: github.event.inputs.service == 'frontend' || github.event.inputs.service == 'both'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        # SECURITY (L6): pass the workflow_dispatch input through env, never
        # interpolate it directly into the shell (script-injection vector).
        env:
          IMAGE_TAG_INPUT: ${{ github.event.inputs.image_tag }}
        run: |
          if [ -n "$IMAGE_TAG_INPUT" ]; then
            TAG="$IMAGE_TAG_INPUT"
          else
            TAG="${{ github.sha }}"
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.tags.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_GO_API_URL=http://backend:8081
            NEXT_PUBLIC_S3_STORAGE_ENDPOINT=${{ secrets.NEXT_PUBLIC_S3_STORAGE_ENDPOINT }}
            NEXT_PUBLIC_S3_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_S3_STORAGE_BUCKET }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}
            NEXT_PUBLIC_CDN_ENDPOINT=${{ secrets.NEXT_PUBLIC_CDN_ENDPOINT }}

      - name: Image build summary
        run: |
          echo "✅ Frontend image built and pushed successfully!"
          echo "Image: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.tags.outputs.TAG }}"

  # Build and push backend
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    if: github.event.inputs.service == 'backend' || github.event.inputs.service == 'both'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        # SECURITY (L6): pass the workflow_dispatch input through env, never
        # interpolate it directly into the shell (script-injection vector).
        env:
          IMAGE_TAG_INPUT: ${{ github.event.inputs.image_tag }}
        run: |
          if [ -n "$IMAGE_TAG_INPUT" ]; then
            TAG="$IMAGE_TAG_INPUT"
          else
            TAG="${{ github.sha }}"
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.tags.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image build summary
        run: |
          echo "✅ Backend image built and pushed successfully!"
          echo "Image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.tags.outputs.TAG }}"

  # Deploy to production VM
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: always() && (needs.build-frontend.result == 'success' || needs.build-backend.result == 'success')
    environment:
      name: production
      url: https://${{ env.DOMAIN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        # SECURITY (L6): pass the workflow_dispatch input through env, never
        # interpolate it directly into the shell (script-injection vector).
        env:
          IMAGE_TAG_INPUT: ${{ github.event.inputs.image_tag }}
        run: |
          if [ -n "$IMAGE_TAG_INPUT" ]; then
            TAG="$IMAGE_TAG_INPUT"
          else
            TAG="${{ github.sha }}"
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying with tag: $TAG"

      # The VM used to `git pull` a separate infrastructure repo in
      # /opt/openmentor/infra. In the monorepo the compose files live in
      # infra/, so sync that subdirectory instead (same semantics as the
      # `infra` target of infra/deploy.sh). No --delete: runtime state
      # (.env, logs, backups, alloy-secrets) living next to the compose files
      # must survive. --checksum --itemize-changes reports WHICH files
      # changed so the deploy step can restart/rebuild services whose config
      # reaches the container through a bind mount (compose won't notice
      # those): alloy <- alloy/config.alloy (restart), postgres-backup is
      # built on the VM from postgres-backup/ (rebuild).
      - name: Sync infra/ to VM
        id: sync
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # SECURITY (H2): prefer a pinned host key over trust-on-first-use.
          # Set the VM_SSH_HOST_KEY secret to the VM's public host key
          # (`ssh-keyscan -H <host>` output, run once from a trusted network)
          # so an ephemeral runner can't be MITM'd on first contact. Falls back
          # to keyscan with a warning until the secret is populated.
          if [ -n "${{ secrets.VM_SSH_HOST_KEY }}" ]; then
            printf '%s\n' "${{ secrets.VM_SSH_HOST_KEY }}" >> ~/.ssh/known_hosts
          else
            echo "::warning::VM_SSH_HOST_KEY not set - falling back to ssh-keyscan (trust-on-first-use). Pin the host key to remove MITM risk."
            ssh-keyscan -p 22 -H "${{ secrets.VM_SSH_HOST }}" >> ~/.ssh/known_hosts
          fi

          rsync -az --checksum --itemize-changes \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'logs/' \
            --exclude 'alloy-secrets/' \
            -e "ssh -i ~/.ssh/deploy_key -p 22" \
            infra/ \
            "${{ secrets.VM_SSH_USER }}@${{ secrets.VM_SSH_HOST }}:/opt/openmentor/infra/" \
            | tee rsync.log

          CHANGED_FILES=$(awk '$1 ~ /^[<>]f/ {print $2}' rsync.log)
          RESTART_ALLOY=0
          REBUILD_BACKUP=0
          if echo "$CHANGED_FILES" | grep -qx 'alloy/config.alloy'; then RESTART_ALLOY=1; fi
          if echo "$CHANGED_FILES" | grep -q '^postgres-backup/'; then REBUILD_BACKUP=1; fi
          echo "restart_alloy=$RESTART_ALLOY" >> $GITHUB_OUTPUT
          echo "rebuild_backup=$REBUILD_BACKUP" >> $GITHUB_OUTPUT
          echo "Bind-mount changes: restart_alloy=$RESTART_ALLOY rebuild_backup=$REBUILD_BACKUP"

      # CI-specific .env preparation: deploy.sh uploads a fresh .env with the
      # tag lines already resolved; the workflow instead edits the tag lines
      # of the VM's existing .env in place. Only the deployed service's tag
      # is updated (FRONTEND_IMAGE_TAG / BACKEND_IMAGE_TAG, matching
      # infra/deploy.sh); the other keeps its currently deployed tag. The
      # previous .env is preserved as .env.backup FIRST so deploy-remote.sh's
      # auto-rollback can restore the previous tags. Uses the SSH key written
      # by the sync step.
      - name: Set image tags on VM
        run: |
          ssh -i ~/.ssh/deploy_key -p 22 \
            "${{ secrets.VM_SSH_USER }}@${{ secrets.VM_SSH_HOST }}" \
            "bash -s" -- "${{ github.event.inputs.service }}" "${{ steps.tag.outputs.TAG }}" <<'TAG_SCRIPT'
          set -e
          SERVICE="$1"
          TAG="$2"
          cd /opt/openmentor/infra

          # Backup the current .env (previous image tags) for rollback
          if [ -f .env ]; then cp .env .env.backup; else touch .env; fi

          # Replace-or-append a KEY=value in .env
          set_env_tag() {
            if grep -q "^${1}=" .env; then
              sed -i "s|^${1}=.*|${1}=${2}|" .env
            else
              echo "${1}=${2}" >> .env
            fi
          }

          if [ "$SERVICE" = "frontend" ] || [ "$SERVICE" = "both" ]; then
            set_env_tag FRONTEND_IMAGE_TAG "$TAG"
          fi
          if [ "$SERVICE" = "backend" ] || [ "$SERVICE" = "both" ]; then
            set_env_tag BACKEND_IMAGE_TAG "$TAG"
          fi
          TAG_SCRIPT

      - name: Configure AWS credentials (mint ECR token for the VM)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Log the VM's docker into ECR from the runner: the short-lived token
      # (OIDC role) is piped over ssh stdin — it never appears in arguments,
      # env files, or on the VM's disk, and the VM holds no AWS credentials
      # and needs no aws CLI. Same mechanism as infra/deploy.sh.
      - name: Log the VM into ECR
        run: |
          aws ecr get-login-password --region "${{ secrets.AWS_REGION }}" \
            | ssh -i ~/.ssh/deploy_key -p 22 \
                "${{ secrets.VM_SSH_USER }}@${{ secrets.VM_SSH_HOST }}" \
                "docker login --username AWS --password-stdin '${{ env.REGISTRY }}'"

      # The remote deploy logic (volume, sidecar rebuild, pull, converge,
      # network-attachment guard, alloy restart, health checks, auto-rollback)
      # lives in infra/deploy-remote.sh — the single canonical script shared
      # with infra/deploy.sh. The runner pipes its CHECKED-OUT copy over ssh
      # stdin, so the executed logic always matches this commit regardless of
      # what the rsync step shipped. The workflow always syncs infra/, hence
      # always --remove-orphans (same as deploy.sh's infra target).
      - name: Deploy on VM
        run: |
          ssh -i ~/.ssh/deploy_key -p 22 \
            "${{ secrets.VM_SSH_USER }}@${{ secrets.VM_SSH_HOST }}" \
            "bash -s -- $(printf '%q ' "--remove-orphans" "${{ steps.sync.outputs.restart_alloy }}" "${{ steps.sync.outputs.rebuild_backup }}")" \
            < infra/deploy-remote.sh

      - name: Verify deployment
        run: |
          echo "⏳ Waiting for services to stabilize..."
          sleep 30

          echo "🔍 Verifying public endpoints..."

          # Check if domain is configured in secrets
          if [ -n "${{ secrets.DOMAIN }}" ]; then
            # Check HTTPS health endpoint
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.DOMAIN }}/api/healthcheck || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Health check passed (HTTP $HTTP_STATUS)"
            else
              echo "⚠️  Health check returned HTTP $HTTP_STATUS"
              echo "This might be expected if DNS/SSL is not yet configured"
            fi
          else
            echo "⚠️  DOMAIN secret not set, skipping public health check"
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag**: ${{ steps.tag.outputs.TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment completed successfully!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Next steps**:" >> $GITHUB_STEP_SUMMARY
            echo "1. Verify application at https://${{ secrets.DOMAIN }}" >> $GITHUB_STEP_SUMMARY
            echo "2. Monitor Grafana dashboards for anomalies" >> $GITHUB_STEP_SUMMARY
            echo "3. Check error logs if needed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Deployment failed!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Troubleshooting**:" >> $GITHUB_STEP_SUMMARY
            echo "1. Check workflow logs above" >> $GITHUB_STEP_SUMMARY
            echo "2. SSH to VM and run: \`docker compose logs\`" >> $GITHUB_STEP_SUMMARY
            echo "3. Consider rolling back: \`./rollback.sh <previous-sha>\` from a workstation, or on the VM: \`cp .env.backup .env && docker compose up -d\`" >> $GITHUB_STEP_SUMMARY
          fi

  # Notify on failure
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "🚨 Deployment failed!"
          echo "Check the workflow logs for details"

          # Add Slack/Telegram/Email notification here if needed
          # Example Slack webhook:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"🚨 Deployment failed! Check GitHub Actions."}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
